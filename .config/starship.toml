format = '$time $username$hostname:$directory $git_branch$character'
#work_format = '$time $directory $git_branch$git_status$all$character'
[time]
disabled = false
style = "black bold bg:blue"
time_format = "%I:%M %p"
format = '[$time]($style)'

[username]
show_always = true
style_user = "blue"
format = '[$user]($style)'

[hostname]
ssh_only = false
style = "bold blue"
format = '[@$hostname]($style)'

[directory]
truncate_to_repo = false
format = '[$path]($style)[$read_only]($read_only_style)'

[git_branch]
symbol = ''
format = "[$branch(:$remote_branch)]($style)"

[character]
success_symbol = "[ \uf105](os)"
error_symbol = "[ \uf105](bold red)"

[line_break]
disabled = true

